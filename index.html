<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enel - Flusso Chiamate</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
        }
        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .title-section p { color: #8892b0; font-size: 1rem; }
        .last-update {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 0.85rem;
            color: #8892b0;
        }
        .last-update span { color: #64ffda; font-weight: 600; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-2px);
        }
        .stat-card.primary {
            background: linear-gradient(135deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.15) 100%);
            border-color: rgba(102,126,234,0.3);
        }
        .stat-card.success {
            background: linear-gradient(135deg, rgba(100,255,218,0.08) 0%, rgba(45,212,191,0.08) 100%);
            border-color: rgba(100,255,218,0.2);
        }
        .stat-card.warning {
            background: linear-gradient(135deg, rgba(251,191,36,0.08) 0%, rgba(245,158,11,0.08) 100%);
            border-color: rgba(251,191,36,0.2);
        }
        .stat-card.danger {
            background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(220,38,38,0.08) 100%);
            border-color: rgba(239,68,68,0.2);
        }
        .stat-label {
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .stat-card.primary .stat-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card.success .stat-value { color: #64ffda; }
        .stat-card.warning .stat-value { color: #fbbf24; }
        .stat-card.danger .stat-value { color: #ef4444; }
        .stat-percentage { font-size: 1rem; color: #8892b0; margin-top: 4px; }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e6f1ff;
        }
        #sankey_chart { width: 100%; height: 500px; }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #8892b0;
            flex-direction: column;
            gap: 15px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
        .legend-text { font-size: 0.9rem; color: #ccd6f6; flex: 1; }
        .legend-count { font-weight: 600; color: #64ffda; }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 20px;
            color: #fca5a5;
            text-align: center;
        }
        .error-msg code {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #8892b0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <h1>Flusso Chiamate</h1>
                <p>Analisi real-time delle chiamate gestite dal Voice Agent</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="last-update">
                    Ultimo aggiornamento: <span id="updateTime">--</span>
                </div>
                <button class="refresh-btn" onclick="loadData()">↻ Aggiorna</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-label">Totale Chiamate</div>
                <div class="stat-value" id="totalCalls">--</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Gestite da AI</div>
                <div class="stat-value" id="aiHandled">--</div>
                <div class="stat-percentage" id="aiPerc">--</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Passaggio Operatore</div>
                <div class="stat-value" id="operatorHandled">--</div>
                <div class="stat-percentage" id="operatorPerc">--</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Tool Error</div>
                <div class="stat-value" id="toolError">--</div>
                <div class="stat-percentage" id="errorPerc">--</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Diagramma Alluvionale - Flusso Chiamate</div>
            <div id="sankey_chart">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Caricamento dati...</span>
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Dettaglio Motivi - Chiamate Gestite da AI</div>
            <div class="legend-grid" id="legendGrid"></div>
        </div>
    </div>

    <script>
        google.charts.load('current', {'packages':['sankey']});
        google.charts.setOnLoadCallback(loadData);
        
        // Google Sheet CSV URL - IMPORTANTE: deve essere pubblicato su web
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1J6kQswwzL9zmj7y_lis4jvKGUYRTyFfjZGXVfL22l-JEHDYUeC2aapUVzObvFhhJu8be7hdcIhKN/pub?gid=0&single=true&output=csv';
        
        function loadData() {
            document.getElementById('sankey_chart').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Caricamento dati...</span>
                </div>
            `;
            
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    console.log('Data loaded:', results.data.length, 'rows');
                    console.log('Headers:', results.meta.fields);
                    processData(results.data);
                    
                    document.getElementById('updateTime').textContent = 
                        new Date().toLocaleString('it-IT', { 
                            day: '2-digit', 
                            month: '2-digit', 
                            year: 'numeric',
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                },
                error: function(error) {
                    console.error('Error loading CSV:', error);
                    document.getElementById('sankey_chart').innerHTML = `
                        <div class="error-msg">
                            Errore nel caricamento dei dati.<br>
                            Assicurati che il Google Sheet sia pubblicato sul web.<br>
                            <code>${error.message || 'CORS o network error'}</code>
                        </div>
                    `;
                }
            });
        }
        
        function processData(rows) {
            // Filtra righe vuote
            const data = rows.filter(row => row['Agente'] || row['Livello 1']);
            
            if (data.length === 0) {
                document.getElementById('sankey_chart').innerHTML = `
                    <div class="error-msg">Nessun dato trovato nel foglio.</div>
                `;
                return;
            }
            
            // Controlla se esistono le colonne Livello 1 e Livello 2
            const hasLevels = data[0].hasOwnProperty('Livello 1') && data[0].hasOwnProperty('Livello 2');
            
            let processedData;
            if (hasLevels) {
                processedData = data.map(row => ({
                    livello1: row['Livello 1'] || 'Non classificato',
                    livello2: row['Livello 2'] || 'Non classificato'
                }));
            } else {
                // Calcola i livelli dai dati raw
                processedData = data.map(row => {
                    const passaggioOp = row['Orario passaggio operatore'] || row['Passaggio a operatore'];
                    const toolsError = row['Tools Error'];
                    const motivo = row['Motivo chiamata'] || 'Non identificato';
                    
                    let livello1, livello2;
                    
                    if (passaggioOp && passaggioOp !== '' && passaggioOp !== 'NO') {
                        livello1 = 'Passaggio Operatore';
                        livello2 = '→ Operatore';
                    } else if (toolsError && toolsError !== '') {
                        livello1 = 'Tool Error';
                        livello2 = '→ Error';
                    } else {
                        livello1 = 'Gestito da AI';
                        livello2 = motivo;
                    }
                    
                    return { livello1, livello2 };
                });
            }
            
            // Conta per livello
            const level1Counts = {};
            const flowCounts = {};
            const aiMotivi = {};
            
            processedData.forEach(row => {
                const l1 = row.livello1;
                const l2 = row.livello2;
                
                level1Counts[l1] = (level1Counts[l1] || 0) + 1;
                
                const flowKey = `${l1}|||${l2}`;
                flowCounts[flowKey] = (flowCounts[flowKey] || 0) + 1;
                
                if (l1 === 'Gestito da AI') {
                    aiMotivi[l2] = (aiMotivi[l2] || 0) + 1;
                }
            });
            
            const total = processedData.length;
            const aiCount = level1Counts['Gestito da AI'] || 0;
            const operatorCount = level1Counts['Passaggio Operatore'] || 0;
            const errorCount = level1Counts['Tool Error'] || 0;
            
            // Aggiorna statistiche
            document.getElementById('totalCalls').textContent = total.toLocaleString('it-IT');
            document.getElementById('aiHandled').textContent = aiCount.toLocaleString('it-IT');
            document.getElementById('aiPerc').textContent = `${((aiCount/total)*100).toFixed(1)}% del totale`;
            document.getElementById('operatorHandled').textContent = operatorCount.toLocaleString('it-IT');
            document.getElementById('operatorPerc').textContent = `${((operatorCount/total)*100).toFixed(1)}% del totale`;
            document.getElementById('toolError').textContent = errorCount.toLocaleString('it-IT');
            document.getElementById('errorPerc').textContent = `${((errorCount/total)*100).toFixed(1)}% del totale`;
            
            // Costruisci dati Sankey
            const sankeyRows = [];
            
            // Flussi Livello 1
            Object.entries(level1Counts).forEach(([level, count]) => {
                sankeyRows.push(['Totale Chiamate', level, count]);
            });
            
            // Flussi Livello 2 (solo per Gestito da AI per evitare cicli)
            Object.entries(flowCounts).forEach(([key, count]) => {
                const [from, to] = key.split('|||');
                if (from === 'Gestito da AI' && to !== from && !to.startsWith('→')) {
                    sankeyRows.push([from, to, count]);
                }
            });
            
            // Disegna Sankey
            const sankeyData = new google.visualization.DataTable();
            sankeyData.addColumn('string', 'From');
            sankeyData.addColumn('string', 'To');
            sankeyData.addColumn('number', 'Weight');
            sankeyData.addRows(sankeyRows);
            
            const options = {
                sankey: {
                    node: {
                        label: {
                            fontName: 'Plus Jakarta Sans',
                            fontSize: 13,
                            color: '#ffffff',
                            bold: true
                        },
                        nodePadding: 40,
                        width: 20,
                        colors: ['#667eea', '#64ffda', '#fbbf24', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#84cc16', '#a855f7']
                    },
                    link: {
                        colorMode: 'gradient'
                    }
                },
                backgroundColor: 'transparent'
            };
            
            const chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
            chart.draw(sankeyData, options);
            
            // Costruisci legenda
            const legendGrid = document.getElementById('legendGrid');
            legendGrid.innerHTML = '';
            
            const colorPalette = ['#64ffda', '#10b981', '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#84cc16', '#a855f7', '#78716c', '#6b7280', '#fbbf24', '#ef4444'];
            let colorIndex = 0;
            
            const sortedMotivi = Object.entries(aiMotivi).sort((a, b) => b[1] - a[1]);
            
            sortedMotivi.forEach(([motivo, count]) => {
                const perc = ((count / aiCount) * 100).toFixed(1);
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${colorPalette[colorIndex % colorPalette.length]}"></div>
                    <div class="legend-text">${motivo}</div>
                    <div class="legend-count">${count} (${perc}%)</div>
                `;
                legendGrid.appendChild(item);
                colorIndex++;
            });
        }
        
        // Auto-refresh ogni 5 minuti
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
