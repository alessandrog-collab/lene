<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enel - Flusso Chiamate</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .title-section p {
            color: #8892b0;
            font-size: 1rem;
        }
        
        .last-update {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 0.85rem;
            color: #8892b0;
        }
        
        .last-update span {
            color: #64ffda;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        
        .stat-card.primary {
            background: linear-gradient(135deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.15) 100%);
            border-color: rgba(102,126,234,0.3);
        }
        
        .stat-card.success {
            background: linear-gradient(135deg, rgba(100,255,218,0.08) 0%, rgba(45,212,191,0.08) 100%);
            border-color: rgba(100,255,218,0.2);
        }
        
        .stat-card.warning {
            background: linear-gradient(135deg, rgba(251,191,36,0.08) 0%, rgba(245,158,11,0.08) 100%);
            border-color: rgba(251,191,36,0.2);
        }
        
        .stat-card.danger {
            background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(220,38,38,0.08) 100%);
            border-color: rgba(239,68,68,0.2);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        
        .stat-card.primary .stat-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-card.success .stat-value {
            color: #64ffda;
        }
        
        .stat-card.warning .stat-value {
            color: #fbbf24;
        }
        
        .stat-card.danger .stat-value {
            color: #ef4444;
        }
        
        .stat-percentage {
            font-size: 1rem;
            color: #8892b0;
            margin-top: 4px;
        }
        
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e6f1ff;
        }
        
        #sankey_chart {
            width: 100%;
            height: 500px;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #8892b0;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        
        .legend-text {
            font-size: 0.9rem;
            color: #ccd6f6;
        }
        
        .legend-count {
            margin-left: auto;
            font-weight: 600;
            color: #64ffda;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }
        
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
            }
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <h1>Flusso Chiamate</h1>
                <p>Analisi real-time delle chiamate gestite dal Voice Agent</p>
            </div>
            <div style="display: flex; align-items: center;">
                <div class="last-update">
                    Ultimo aggiornamento: <span id="updateTime">--</span>
                </div>
                <button class="refresh-btn" onclick="loadData()">↻ Aggiorna</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-label">Totale Chiamate</div>
                <div class="stat-value" id="totalCalls">--</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Gestite da AI</div>
                <div class="stat-value" id="aiHandled">--</div>
                <div class="stat-percentage" id="aiPerc">--</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Passaggio Operatore</div>
                <div class="stat-value" id="operatorHandled">--</div>
                <div class="stat-percentage" id="operatorPerc">--</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Tool Error</div>
                <div class="stat-value" id="toolError">--</div>
                <div class="stat-percentage" id="errorPerc">--</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Diagramma Alluvionale - Flusso Chiamate</div>
            <div id="sankey_chart">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Caricamento dati...
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Dettaglio Motivi - Chiamate Gestite da AI</div>
            <div class="legend-grid" id="legendGrid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        google.charts.load('current', {'packages':['sankey']});
        
        // Using Google Visualization API Query to fetch directly from Sheets
        const SHEET_ID = '1vT1J6kQswwzL9zmj7y_lis4jvKGUYRTyFfjZGXVfL22l-JEHDYUeC2aapUVzObvFhhJu8be7hdcIhKN';
        
        function loadData() {
            google.charts.setOnLoadCallback(function() {
                // Use Google Visualization API Query
                const query = new google.visualization.Query(
                    'https://docs.google.com/spreadsheets/d/13mLeQNdisIPwWXpiKMLZ5qkIQNLcxK3yfIxoRIdxkr8/gviz/tq?gid=0'
                );
                
                query.send(handleQueryResponse);
            });
        }
        
        function handleQueryResponse(response) {
            if (response.isError()) {
                console.error('Error in query: ' + response.getMessage());
                document.getElementById('sankey_chart').innerHTML = 
                    '<div class="loading" style="color: #ef4444;">Errore: ' + response.getMessage() + '</div>';
                return;
            }
            
            const dataTable = response.getDataTable();
            const data = [];
            
            // Get column indices
            const headers = [];
            for (let i = 0; i < dataTable.getNumberOfColumns(); i++) {
                headers.push(dataTable.getColumnLabel(i));
            }
            
            const l1Index = headers.indexOf('Livello 1');
            const l2Index = headers.indexOf('Livello 2');
            
            if (l1Index === -1 || l2Index === -1) {
                console.error('Columns not found. Headers:', headers);
                document.getElementById('sankey_chart').innerHTML = 
                    '<div class="loading" style="color: #ef4444;">Colonne Livello 1/2 non trovate</div>';
                return;
            }
            
            // Parse data
            for (let i = 0; i < dataTable.getNumberOfRows(); i++) {
                data.push({
                    'Livello 1': dataTable.getValue(i, l1Index) || 'Non classificato',
                    'Livello 2': dataTable.getValue(i, l2Index) || 'Non classificato'
                });
            }
            
            processAndDraw(data);
            
            document.getElementById('updateTime').textContent = 
                new Date().toLocaleString('it-IT', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric',
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
        }
        
        function processAndDraw(data) {
            // Count by Livello 1
            const level1Counts = {};
            const level2Counts = {};
            const aiMotivi = {};
            
            data.forEach(row => {
                const l1 = row['Livello 1'] || 'Non classificato';
                const l2 = row['Livello 2'] || 'Non classificato';
                
                level1Counts[l1] = (level1Counts[l1] || 0) + 1;
                
                const key = `${l1}|||${l2}`;
                level2Counts[key] = (level2Counts[key] || 0) + 1;
                
                if (l1 === 'Gestito da AI') {
                    aiMotivi[l2] = (aiMotivi[l2] || 0) + 1;
                }
            });
            
            const total = data.length;
            const aiCount = level1Counts['Gestito da AI'] || 0;
            const operatorCount = level1Counts['Passaggio Operatore'] || 0;
            const errorCount = level1Counts['Tool Error'] || 0;
            
            // Update stats
            document.getElementById('totalCalls').textContent = total.toLocaleString('it-IT');
            document.getElementById('aiHandled').textContent = aiCount.toLocaleString('it-IT');
            document.getElementById('aiPerc').textContent = `${((aiCount/total)*100).toFixed(1)}% del totale`;
            document.getElementById('operatorHandled').textContent = operatorCount.toLocaleString('it-IT');
            document.getElementById('operatorPerc').textContent = `${((operatorCount/total)*100).toFixed(1)}% del totale`;
            document.getElementById('toolError').textContent = errorCount.toLocaleString('it-IT');
            document.getElementById('errorPerc').textContent = `${((errorCount/total)*100).toFixed(1)}% del totale`;
            
            // Build Sankey data
            const sankeyRows = [];
            
            // Level 1 flows
            Object.entries(level1Counts).forEach(([level, count]) => {
                sankeyRows.push(['Totale Chiamate', level, count]);
            });
            
            // Level 2 flows (only for Gestito da AI)
            Object.entries(level2Counts).forEach(([key, count]) => {
                const [from, to] = key.split('|||');
                if (from === 'Gestito da AI' && to !== from && to !== '2. Operatore' && to !== '2. Error') {
                    sankeyRows.push([from, to, count]);
                }
            });
            
            // Create DataTable for Sankey
            const sankeyData = new google.visualization.DataTable();
            sankeyData.addColumn('string', 'From');
            sankeyData.addColumn('string', 'To');
            sankeyData.addColumn('number', 'Weight');
            sankeyData.addRows(sankeyRows);
            
            const options = {
                sankey: {
                    node: {
                        label: {
                            fontName: 'Plus Jakarta Sans',
                            fontSize: 13,
                            color: '#ccd6f6',
                            bold: true
                        },
                        nodePadding: 30,
                        width: 20,
                        colors: ['#667eea', '#64ffda', '#fbbf24', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#84cc16']
                    },
                    link: {
                        colorMode: 'gradient'
                    }
                },
                backgroundColor: 'transparent'
            };
            
            const chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
            chart.draw(sankeyData, options);
            
            // Build legend
            const legendGrid = document.getElementById('legendGrid');
            legendGrid.innerHTML = '';
            
            const colorPalette = ['#64ffda', '#10b981', '#8b5cf6', '#ec4899', '#f97316', '#06b6d4', '#84cc16', '#a855f7', '#78716c', '#6b7280'];
            let colorIndex = 0;
            
            const sortedMotivi = Object.entries(aiMotivi).sort((a, b) => b[1] - a[1]);
            
            sortedMotivi.forEach(([motivo, count]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${colorPalette[colorIndex % colorPalette.length]}"></div>
                    <div class="legend-text">${motivo}</div>
                    <div class="legend-count">${count}</div>
                `;
                legendGrid.appendChild(item);
                colorIndex++;
            });
        }
        
        // Load on page load
        google.charts.setOnLoadCallback(loadData);
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
